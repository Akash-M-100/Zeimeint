# ─────────────────────────────────────────────────────────────────────────────
# Sample Nginx reverse-proxy config for the Zeminent LMS on a Hostinger VPS.
#
# The three apps are separate repos, each cloned into its own dir on the VPS and
# run locally via PM2:
#   - student app  (zeminent-learn)        -> 127.0.0.1:7000
#   - admin panel  (zeminent-admin-panel)  -> 127.0.0.1:7001
#   - backend API  (zeminent-learn-backend)-> 127.0.0.1:4000
#
# One subdomain per app. Replace `zeminent.com` with your real domain and point
# the DNS A records (learn / admin / api) at the VPS IP first.
#
# Install:
#   sudo cp deploy/nginx/zeminent.conf /etc/nginx/sites-available/zeminent.conf
#   sudo ln -s /etc/nginx/sites-available/zeminent.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS (free certs, auto-renew) — certbot rewrites these blocks for you:
#   sudo certbot --nginx -d learn.zeminent.com -d admin.zeminent.com -d api.zeminent.com
# ─────────────────────────────────────────────────────────────────────────────

# ── Student app → learn.zeminent.com ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name learn.zeminent.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_cache_bypass                  $http_upgrade;
        proxy_read_timeout                  300s;
    }
}

# ── Admin panel → admin.zeminent.com ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name admin.zeminent.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:7001;
