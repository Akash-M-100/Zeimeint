name: Deploy to production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-zeminent-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            bash /home/deploy/apps/zeminent/learning/deploy/deploy.sh zeminent-learn-backend
